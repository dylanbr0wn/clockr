# shiet app/runtime configuration (optional).
# Copy to one of:
#   - ~/.config/shiet/config.yaml
#   - <UserConfigDir>/shiet/config.yaml  (e.g. ~/Library/Application Support/shiet on macOS)
#   - ./shiet.yaml  (local dev, cwd)
#
# Environment variables override file values (highest precedence):
#   SHIET_DB                       -> db.path
#   SHIET_GOOGLE_AUTH_MODE         -> google.auth_mode
#   SHIET_GOOGLE_BROKER_BASE_URL   -> google.broker_base_url
#   SHIET_GOOGLE_CLIENT_ID         -> google.client_id
#   SHIET_GOOGLE_CLIENT_SECRET     -> google.client_secret
#
# google.auth_mode:
#   - broker (public default when no local client_id is set): secret-only OAuth broker;
#     no desktop client_secret required or retained
#   - local: BYO/desktop OAuth with google.client_id (+ client_secret when Google requires it)
#   - omit auth_mode with a client_id set to keep existing BYO configs on local mode
#
# Public builds default to broker mode and must not embed a shared Google client_secret.
# Google Desktop OAuth clients may require client_secret at the token endpoint in local mode,
# but desktop apps cannot keep it confidential once shipped.

db:
  path: ~/.config/shiet/shiet.db

google:
  auth_mode: broker
  broker_base_url: https://auth.shiet.app
  client_id: ""
  client_secret: ""
